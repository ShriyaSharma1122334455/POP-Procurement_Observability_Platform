name: POP CI

on:
  pull_request:
    branches:
      - main
      - develop

  push:
    branches:
      - main
      - develop

jobs:

  ########################################
  # FRONTEND
  ########################################
  frontend:

    name: Frontend Checks

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Build Frontend
        run: npm run build

  ########################################
  # BACKEND
  ########################################
  backend:

    name: Backend Checks

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:

      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pop_test

        ports:
          - 5432:5432

        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pop_test

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Validate Prisma Schema
        run: npx prisma validate

      - name: Run Migrations
        run: npx prisma migrate deploy

      - name: Run ESLint
        run: npm run lint

      - name: Run Unit Tests
        run: npm test -- --runInBand

      - name: Build Backend
        run: npm run build

  ########################################
  # AI SERVICE
  ########################################
  ai-service:

    name: AI Service Checks

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ai-services

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: |
          pip install ruff
          ruff check .

      - name: Validate FastAPI Imports
        run: |
          python -c "from app.main import app"

      - name: Run Tests
        run: |
          pytest

  ########################################
  # DOCKER VALIDATION
  ########################################
  docker:

    name: Docker Build Check

    runs-on: ubuntu-latest

    needs:
      - frontend
      - backend
      - ai-service

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Frontend Image
        run: |
          docker build \
            -t pop-frontend:test \
            ./frontend

      - name: Build Backend Image
        run: |
          docker build \
            -t pop-backend:test \
            ./backend

      - name: Build AI Image
        run: |
          docker build \
            -t pop-ai:test \
            ./ai-services